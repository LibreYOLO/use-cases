<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YOLO in Chrome - LibreYOLO</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="description" content="Real-time webcam YOLO object detection in Chrome. Zero install. 100% MIT.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #0891b2;
      --color-primary-light: #06b6d4;
      --color-bg: #020617;
      --color-card: #1e293b;
      --color-text: #e2e8f0;
      --color-muted: #64748b;
      --color-border: rgba(255, 255, 255, 0.06);
      --color-accent: #10b981;
      --grid-size: 60px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: var(--color-bg);
      color: var(--color-text);
      font: 16px/1.55 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(8, 145, 178, 0.10), transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(16, 185, 129, 0.06), transparent 60%),
        linear-gradient(rgba(8, 145, 178, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(8, 145, 178, 0.04) 1px, transparent 1px);
      background-size: auto, auto, var(--grid-size) var(--grid-size), var(--grid-size) var(--grid-size);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    a { color: var(--color-primary-light); text-decoration: none; transition: color .2s ease; }
    a:hover { color: var(--color-text); }

    header { padding: 32px 16px 20px; text-align: center; max-width: 720px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.14), rgba(8, 145, 178, 0.14));
      border: 1px solid rgba(16, 185, 129, 0.32);
      color: var(--color-accent);
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--color-accent); box-shadow: 0 0 8px var(--color-accent); }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 5vw, 44px); font-weight: 700; letter-spacing: -.02em; line-height: 1.05; }
    h1 .accent { background: linear-gradient(135deg, var(--color-primary-light), var(--color-accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    header p { margin: 0; color: var(--color-muted); font-size: 15px; }

    .stage {
      position: relative;
      width: min(720px, 95vw);
      aspect-ratio: 4 / 3;
      background: #000;
      border: 1px solid var(--color-border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(8, 145, 178, 0.08), 0 30px 80px -30px rgba(8, 145, 178, 0.30);
    }
    .stage video, .stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .stage video { object-fit: cover; }

    #status {
      margin: 14px 0 4px;
      padding: 8px 16px;
      font: 500 13px/1.4 'JetBrains Mono', ui-monospace, monospace;
      color: var(--color-muted);
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: 999px;
      min-width: 240px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    #status.live { color: var(--color-accent); border-color: rgba(16, 185, 129, 0.30); }

    footer { margin-top: auto; padding: 28px 16px; color: var(--color-muted); font-size: 12px; text-align: center; }
    footer a { color: var(--color-muted); border-bottom: 1px dotted var(--color-muted); }
    footer a:hover { color: var(--color-text); border-color: var(--color-text); }
  </style>
</head>
<body>
  <header>
    <span class="badge">Live demo</span>
    <h1>YOLO in <span class="accent">Chrome</span></h1>
    <p>Zero install. 100% MIT. Powered by <a href="https://github.com/LibreYOLO/libreyolo-web">libreyolo-web</a>.</p>
  </header>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="status">Loading model...</div>

  <footer>
    MIT licensed. <a href="https://github.com/LibreYOLO/use-cases/tree/main/chromium">Source on GitHub</a>.
    Part of <a href="https://libreyolo.com">LibreYOLO</a>.
  </footer>

  <script type="module">
    // Explicit peer-dep import so the fetch is visible in DevTools and breaks
    // loudly if esm.sh resolution ever changes.
    import 'https://esm.sh/onnxruntime-web@1.21.0';
    import { loadModel, BoxOverlay } from 'https://esm.sh/libreyolo-web@0.0.5';

    const video = document.getElementById('video');
    const canvas = document.getElementById('overlay');
    const statusEl = document.getElementById('status');

    const setStatus = (msg, live = false) => {
      statusEl.textContent = msg;
      statusEl.classList.toggle('live', live);
    };

    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
      video.srcObject = stream;
      await new Promise((resolve) => { video.onloadedmetadata = resolve; });
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
    } catch (err) {
      setStatus(`Camera error: ${err.message}. Allow camera access and reload.`);
      throw err;
    }

    setStatus('Downloading model (LibreYOLOXn, ~3.6 MB)...');
    const model = await loadModel('LibreYOLOXn', {
      onProgress: (p) => setStatus(`Downloading model: ${(p * 100).toFixed(0)}%`),
    });

    const overlay = new BoxOverlay({ canvas, lineWidth: 3, fontSize: 14 });

    // libreyolo-web v0.0.5's PreProcessor reads `naturalWidth`/`width` to size the input,
    // and HTMLVideoElement has neither (it has `videoWidth`/`videoHeight`). We work around
    // that by drawing each frame to an OffscreenCanvas and passing the canvas to predict().
    const frameCanvas = new OffscreenCanvas(1, 1);
    const frameCtx = frameCanvas.getContext('2d');

    setStatus(`Running on ${model.provider}. Show the camera something.`);

    let lastTime = performance.now();
    async function loop() {
      if (video.readyState >= 2 && video.videoWidth > 0) {
        if (frameCanvas.width !== video.videoWidth || frameCanvas.height !== video.videoHeight) {
          frameCanvas.width = video.videoWidth;
          frameCanvas.height = video.videoHeight;
        }
        frameCtx.drawImage(video, 0, 0);
        const result = await model.predict(frameCanvas);
        overlay.draw(result.detections, {
          originalWidth: video.videoWidth,
          originalHeight: video.videoHeight,
        });
        const now = performance.now();
        const fps = 1000 / (now - lastTime);
        lastTime = now;
        setStatus(`${result.numDetections} detections · ${fps.toFixed(0)} FPS · ${model.provider}`, true);
        if (!window.__detectionsReady) window.__detectionsReady = true;
      }
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
